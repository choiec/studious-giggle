name: Copilot Setup Steps

on:
  workflow_dispatch:
  push:
    paths:
      - .github/workflows/copilot-setup-steps.yml
      - .editorconfig
      - build.gradle.kts
      - config/ktlint/baseline.xml
      - gradle/wrapper/gradle-wrapper.properties
      - ktlint-plugins.properties
  pull_request:
    paths:
      - .github/workflows/copilot-setup-steps.yml
      - .editorconfig
      - build.gradle.kts
      - config/ktlint/baseline.xml
      - gradle/wrapper/gradle-wrapper.properties
      - ktlint-plugins.properties

jobs:
  copilot-setup-steps:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    permissions:
      contents: read
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Java 25
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "25"

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@017a9effdb900e5b5b2fddfb590a105619dca3c3 # v4.4.2

      - name: Ensure Gradle wrapper is executable
        run: chmod +x gradlew

      - name: Preload build, test, and lint dependencies
        run: ./gradlew --no-daemon testClasses ktlintCheck -x test
