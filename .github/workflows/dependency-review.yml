name: Dependency Review

on:
  workflow_dispatch:
  pull_request:

permissions:
  contents: read
  pull-requests: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  dependency-review:
    runs-on: ubuntu-latest
    steps:
      - name: Check dependency graph readiness
        id: dependency-graph
        env:
          GH_TOKEN: ${{ github.token }}
          REPO_OWNER: ${{ github.repository_owner }}
          REPO_NAME: ${{ github.event.repository.name }}
        run: |
          set -euo pipefail
          count="$(gh api graphql \
            -f query='query($owner:String!, $name:String!){ repository(owner:$owner, name:$name){ dependencyGraphManifests(first:1){ totalCount } } }' \
            -F owner="$REPO_OWNER" \
            -F name="$REPO_NAME" \
            --jq '.data.repository.dependencyGraphManifests.totalCount')"
          if [[ "$count" -gt 0 ]]; then
            echo "ready=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          echo "ready=false" >> "$GITHUB_OUTPUT"
          echo "::warning::Dependency graph is not ready for $REPO_OWNER/$REPO_NAME. Skipping dependency review until Dependency graph is enabled and the default branch has at least one dependency snapshot."

      - name: Review dependency changes
        if: steps.dependency-graph.outputs.ready == 'true'
        uses: actions/dependency-review-action@v4
        with:
          fail-on-severity: high
